name: App CD

on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./simple-app
          file: ./simple-app/Dockerfile
          push: true
          tags: giovannifs/aula-docker-26-1:latest
          
  deploy: 
    needs: delivery
    runs-on: ubuntu-latest

    steps:
      - name: SSH to VM 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker pull giovannifs/aula-docker-26-1:latest
            docker stop aula-docker-26-1 || true
            docker rm aula-docker-26-1 || true
            docker run -d --name aula-docker-26-1 -p 4000:3000 giovannifs/aula-docker-26-1


